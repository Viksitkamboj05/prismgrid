<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="#0B1020"/>

  <!-- Glow Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#19C2FF"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#19C2FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#19C2FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow -->
  <circle cx="128" cy="128" r="90" fill="url(#glow)" />

  <!-- Prism Shape -->
  <polygon points="128,50 200,180 56,180" fill="url(#grad1)" opacity="0.9"/>

  <!-- Inner Grid Lines -->
  <line x1="128" y1="50" x2="128" y2="180" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2"/>
  <line x1="90" y1="115" x2="166" y2="115" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Network Nodes -->
  <circle cx="128" cy="50" r="5" fill="#FFFFFF"/>
  <circle cx="56" cy="180" r="5" fill="#FFFFFF"/>
  <circle cx="200" cy="180" r="5" fill="#FFFFFF"/>
  <circle cx="128" cy="115" r="4" fill="#FFFFFF"/>

</svg>